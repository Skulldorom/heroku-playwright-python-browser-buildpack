name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  unit:
    name: Fast stubbed tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: test/run.sh

  integration:
    name: Browser integration (heroku-26)
    runs-on: ubuntu-latest
    container: heroku/heroku:26-build
    steps:
      - uses: actions/checkout@v7
      - name: Install Python Playwright
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv
          python3 -m venv /tmp/playwright-venv
          /tmp/playwright-venv/bin/pip install playwright
      - name: Compile buildpack and launch Chromium headless shell
        env:
          STACK: heroku-26
        run: |
          mkdir -p /app /tmp/buildpack-cache /tmp/buildpack-env
          export PATH="/tmp/playwright-venv/bin:$PATH"
          bin/compile /app /tmp/buildpack-cache /tmp/buildpack-env
          export HOME=/app
          . /app/.profile.d/playwright-browsers.sh
          printf '%s\n' '<!doctype html><title>buildpack integration</title><h1>Playwright works</h1>' >/app/page.html
          browser=$(find "$PLAYWRIGHT_BROWSERS_PATH" -type f -name chrome-headless-shell -print -quit)
          test -n "$browser"
          "$browser" --no-sandbox --headless --disable-gpu --dump-dom file:///app/page.html | grep -q 'Playwright works'

  release:
    name: Publish GitHub release
    needs: [unit, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Package buildpack
        run: git archive --format=tar.gz --prefix=heroku-playwright-python-browser-buildpack/ --output=buildpack.tgz "$GITHUB_SHA"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" buildpack.tgz --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
