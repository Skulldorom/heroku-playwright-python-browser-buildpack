name: Release

on:
  workflow_run:
    workflows: [Buildpack tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      increment:
        description: Semantic version component to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release

permissions:
  contents: read

jobs:
  unit:
    name: Fast stubbed tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: test/run.sh

  integration:
    name: Browser integration (heroku-26)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # The Heroku image defaults to an unprivileged user that cannot write the
    # runner's file-command directory used by actions/checkout.
    container:
      image: heroku/heroku:26-build
      options: --user root
    steps:
      - uses: actions/checkout@v7
      - name: Install Python Playwright
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv
          python3 -m venv /tmp/playwright-venv
          /tmp/playwright-venv/bin/pip install playwright
      - name: Compile buildpack and launch Chromium headless shell
        env:
          STACK: heroku-26
        run: |
          mkdir -p /app /tmp/buildpack-cache /tmp/buildpack-env
          export PATH="/tmp/playwright-venv/bin:$PATH"
          bin/compile /app /tmp/buildpack-cache /tmp/buildpack-env
          export HOME=/app
          . /app/.profile.d/playwright-browsers.sh
          printf '%s\n' '<!doctype html><title>buildpack integration</title><h1>Playwright works</h1>' >/app/page.html
          browser=$(find "$PLAYWRIGHT_BROWSERS_PATH" -type f -name chrome-headless-shell -print -quit)
          test -n "$browser"
          "$browser" --no-sandbox --headless --disable-gpu --dump-dom file:///app/page.html | grep -q 'Playwright works'

  release:
    name: Publish GitHub release
    needs: [unit, integration]
    if: >-
      always() &&
      ((github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success') ||
       (github.event_name == 'workflow_dispatch' &&
        needs.unit.result == 'success' &&
        needs.integration.result == 'success'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Select next version
        id: version
        env:
          INCREMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.increment || 'patch' }}
        run: |
          current=$(git tag --list | sed -nE '/^v[0-9]+\.[0-9]+\.[0-9]+$/p' | sort -V | tail -n 1)
          next=$(bin/next-version "${current:-v0.0.0}" "$INCREMENT")
          echo "tag=$next" >> "$GITHUB_OUTPUT"
      - name: Package buildpack
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: git archive --format=tar.gz --prefix=heroku-playwright-python-browser-buildpack/ --output=buildpack.tgz "$RELEASE_SHA"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          gh release create "$RELEASE_TAG" buildpack.tgz --target "$RELEASE_SHA" --generate-notes --title "$RELEASE_TAG"
